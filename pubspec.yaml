name: sarthi_kendra
description: Sarthi Kendra - Helper App (Apna Sarthi, Apna Rozgar)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  # Firebase
  firebase_core: ^2.27.0
  geocoding: ^2.1.1

  firebase_database: ^10.4.9
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.8
